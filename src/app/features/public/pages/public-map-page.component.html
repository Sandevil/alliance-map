<main class="public-page">
  <header class="public-page__header">
    <div>
      <h1>CRU Territory Planner</h1>
    </div>

    <div class="public-page__header-actions">
      <a routerLink="/admin/login" class="public-page__admin-link">Admin access</a>
    </div>
  </header>

  <section class="public-page__content">
    <aside class="public-search">
      <h2>Town search</h2>
      <input
        type="text"
        [ngModel]="query()"
        (ngModelChange)="onQueryChange($event)"
        placeholder="Search town by player name" />
      <button type="button" class="public-search__clear" (click)="clearSearch()">Clear search</button>

      @if (query().trim().length === 0) {
        <p class="public-search__hint">Type part of a player name to find towns.</p>
      } @else {
        <ul class="public-search__results">
          @for (item of cityResults(); track item.playerId) {
            <li>
              <button
                type="button"
                (click)="selectCity(item.playerId)"
                [class.public-search__result--active]="selectedPlayerId() === item.playerId">
                <strong>{{ item.playerName }}</strong>
                <small>
                  Power: {{ item.playerPower | number }} · Internal: {{ item.origin.x }}/{{ item.origin.y }} · External:
                  {{ getExternalCoordsLabel(item.origin.x, item.origin.y) }}
                </small>
              </button>
            </li>
          } @empty {
            <li class="public-search__empty">No matching towns.</li>
          }
        </ul>
      }
    </aside>

    <div class="public-page__board-wrap">
      <app-map-board [state]="state()" [highlightPlayerId]="selectedPlayerId()" />
      <div class="public-page__legend-floating public-page__legend-floating--mobile-safe">
        <app-map-legend />
      </div>
    </div>
  </section>
</main>
