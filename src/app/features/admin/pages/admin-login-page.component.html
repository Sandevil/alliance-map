<main class="admin-login">
  <section class="admin-login__card">
    <p class="admin-login__brand">CRU Territory Planner</p>
    <h1>Admin access</h1>
    <p>Enter password to open the admin editor.</p>

    <form (ngSubmit)="login()" class="admin-login__form">
      <label>
        Password
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Enter admin password"
          required />
      </label>

      <button type="submit" [disabled]="remainingLockSeconds() > 0">Login</button>
    </form>

    @if (feedback(); as message) {
      <p class="admin-login__feedback">{{ message }}</p>
    }

    @if (remainingLockSeconds() > 0) {
      <p class="admin-login__feedback">Locked. Try again in {{ remainingLockSeconds() }}s.</p>
    }

    <a routerLink="/">Back to public map</a>
  </section>
</main>
